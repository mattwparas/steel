name: Docker CI

on:
  push:
  # runs on every commit
    branches: ["master"]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Build the docker image
        run: docker build -t steel/steel:latest .

      - name: Authenticate to the Docker Hub
        run: docker login -u steel -p ${{ secrets.DOCKER_HUB_PWD }}

      - name: Push the docker image
        run: docker push steel/steel:latest
